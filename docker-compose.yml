services:
  win11:
    image: dockurr/windows
    container_name: win11
    environment:
      VERSION: "11"
      KVM: "N"          # deshabilita aceleración (muy lento, pero arranca)
      RAM_SIZE: "2G"
    devices:
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    ports:
      - "8006:8006"
      - "33890:3389/tcp"
      - "33890:3389/udp"
    volumes:
      - ./windows:/storage
      - ./work:/shared
    restart: unless-stopped
    stop_grace_period: 2m